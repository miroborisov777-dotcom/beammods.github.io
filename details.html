<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mod Details | BeamMods</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #0b0e14; --card-bg: #161b22; --border: #30363d; --accent: #3498db; --text-dim: #8b949e; }
        body { background-color: var(--bg); color: white; margin: 0; font-family: 'Inter', sans-serif; }
        .header { background: var(--bg); border-bottom: 1px solid var(--border); padding: 12px 24px; display: flex; align-items: center; justify-content: space-between; }
        .back-btn { background: var(--card-bg); border: 1px solid var(--border); padding: 8px 16px; border-radius: 8px; color: white; text-decoration: none; font-size: 14px; font-weight: 600; transition: 0.2s; }
        .back-btn:hover { border-color: var(--accent); background: var(--border); }
        .container { max-width: 1000px; margin: 40px auto; padding: 0 20px; display: grid; grid-template-columns: 1fr 350px; gap: 40px; }
        .mod-image { width: 100%; border-radius: 12px; border: 1px solid var(--border); aspect-ratio: 16/9; object-fit: cover; }
        .info-box { background: var(--card-bg); border: 1px solid var(--border); border-radius: 12px; padding: 25px; height: fit-content; }
        .mod-title { font-size: 32px; font-weight: 800; margin: 0 0 10px 0; }
        .mod-author { color: var(--accent); font-weight: 600; margin-bottom: 20px; display: block; }
        .description { line-height: 1.6; color: #ccc; font-size: 15px; margin-top: 20px; white-space: pre-wrap; }
        .download-btn { display: block; text-align: center; background: var(--accent); color: white; padding: 16px; border-radius: 10px; text-decoration: none; font-weight: 800; font-size: 16px; margin-top: 20px; transition: 0.3s; }
        .download-btn:hover { filter: brightness(1.2); transform: translateY(-2px); }
        .tag-pill { background: #232a35; color: var(--text-dim); padding: 4px 12px; border-radius: 20px; font-size: 12px; font-weight: 700; margin-bottom: 15px; display: inline-block; }
        @media (max-width: 850px) { .container { grid-template-columns: 1fr; } .info-box { order: 2; } }
    </style>
</head>
<body>

    <header class="header">
        <a href="index.html" class="back-btn">← Back to Gallery</a>
        <div style="font-weight: 800; letter-spacing: 2px;">BEAM<span>MODS</span></div>
        <div style="width: 100px;"></div>
    </header>

    <div class="container" id="mod-details">
        <p>Fetching mod data...</p>
    </div>

  <script>
    const SHEET_URL = 'https://docs.google.com/spreadsheets/d/1O-ShYPauFxMhzSSMtBtjYNJWiRSucc0yIKweex6fgis/gviz/tq?tqx=out:csv';

    async function loadDetails() {
        const params = new URLSearchParams(window.location.search);
        // This gets the name from the URL (e.g., Lambo%20Diablo)
        const modName = decodeURIComponent(params.get('id')); 

        try {
            const response = await fetch(SHEET_URL);
            const csvText = await response.text();
            const allMods = parseCSV(csvText);
            
            // Search the list for the mod that has the exact same name
            const mod = allMods.find(m => m.name === modName);

            if (mod) { 
                renderPage(mod); 
            } else { 
                document.getElementById('mod-details').innerHTML = "<h2>Mod not found!</h2><p>We couldn't find a mod named '" + modName + "'.</p>"; 
            }
        } catch (e) {
            console.error(e);
            document.getElementById('mod-details').innerHTML = "<h2>Connection Error</h2><p>Unable to reach the database.</p>";
        }
    }

    function parseCSV(text) {
        const lines = text.split(/\r?\n/);
        const headers = lines[0].split(',').map(h => h.replace(/"/g, '').trim().toLowerCase());
        const result = [];
        for (let i = 1; i < lines.length; i++) {
            if (!lines[i]) continue;
            const values = lines[i].match(/(".*?"|[^",\s]+)(?=\s*,|\s*$)/g) || [];
            const obj = {};
            headers.forEach((header, index) => {
                let val = values[index] || "";
                obj[header] = val.replace(/^"|"$/g, '').trim();
            });
            result.push(obj);
        }
        return result;
    }

    function renderPage(mod) {
        const container = document.getElementById('mod-details');
        container.innerHTML = `
            <div>
                <img src="${mod.image}" class="mod-image" onerror="this.src='https://via.placeholder.com/800x450?text=Image+Not+Found'">
                <div class="description">${mod.description || 'No description provided.'}</div>
            </div>
            <div class="info-box">
                <span class="tag-pill">${mod.tag || 'VERIFIED'}</span>
                <h1 class="mod-title">${mod.name}</h1>
                <span class="mod-author">by ${mod.author}</span>
                <p style="font-size: 13px; color: var(--text-dim);">Category: <b>${mod.category}</b></p>
                <a href="${mod.link}" target="_blank" class="download-btn">Download Mod</a>
            </div>
        `;
        document.title = mod.name + " | BeamMods";
    }

    window.onload = loadDetails;
</script>
</body>
</html>
