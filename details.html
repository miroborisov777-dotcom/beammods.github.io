<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mod Details | BeamMods</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body { background-color: #0b0e14; color: white; font-family: 'Inter', sans-serif; }
        .details-layout { max-width: 1100px; margin: 50px auto; display: grid; grid-template-columns: 1fr 320px; gap: 40px; padding: 0 20px; }
        .hero-img { width: 100%; border-radius: 12px; border: 1px solid #222; }
        .author-text { color: #555; font-size: 14px; margin-top: 5px; }
        .author-text span { color: #3498db; cursor: pointer; }
        .description-box { background: #161b22; padding: 20px; border-radius: 10px; margin-top: 30px; line-height: 1.6; color: #ccc; }
        .sidebar-card { background: #161b22; padding: 20px; border-radius: 12px; border: 1px solid #222; height: fit-content; position: sticky; top: 20px; }
        .dl-btn { display: block; background: #3498db; color: white; text-align: center; padding: 15px; border-radius: 8px; text-decoration: none; font-weight: bold; margin-bottom: 20px; transition: 0.2s; }
        .dl-btn:hover { background: #2980b9; }
        .stat-row { display: flex; justify-content: space-between; padding: 12px 0; border-bottom: 1px solid #222; font-size: 14px; color: #888; }
        .stat-row span { color: #fff; font-weight: 500; }
        @media (max-width: 850px) { .details-layout { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
    <header class="header">
        <div class="logo" onclick="window.location.href='index.html'" style="cursor:pointer">BEAM<span>MODS</span></div>
    </header>

    <main class="details-layout" id="details-content">
        <p>Loading mod details...</p>
    </main>

    <script>
        async function loadDetails() {
            const params = new URLSearchParams(window.location.search);
            const id = params.get('id');
            const response = await fetch('mods.json');
            const mods = await response.json();
            const mod = mods[id];

            if (!mod) {
                document.getElementById('details-content').innerHTML = "<h1>Mod Not Found</h1>";
                return;
            }

            document.getElementById('details-content').innerHTML = `
                <div class="main-content">
                    <img src="${mod.image}" class="hero-img">
                    <h1 style="margin-top:25px; font-size:28px;">${mod.name}</h1>
                    <p class="author-text">by <span>${mod.author || 'Unknown'}</span> - IRL Vehicle</p>
                    <div class="description-box">
                        ${mod.description}
                    </div>
                </div>
                <aside class="sidebar-card">
                    <a href="${mod.download}" target="_blank" class="dl-btn">⬇ Download</a>
                    <div class="stat-row">Category <span>${mod.category}</span></div>
                    <div class="stat-row">Size <span>${mod.size || 'N/A'}</span></div>
                    <div class="stat-row">Version <span>${mod.version || '1.0'}</span></div>
                    <div class="stat-row">Status <span>${mod.tag || 'Stable'}</span></div>
                </aside>
            `;
        }
        loadDetails();
    </script>
</body>
</html>
