<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BeamMods | Premium BeamNG Mods</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>

    <header class="header">
        <div class="logo">BEAM<span>MODS</span></div>
        <div class="search-container">
            <input type="text" id="search" placeholder="Search for mods..." onkeyup="searchMods()">
        </div>
    </header>

    <main class="main-layout">
        <aside class="sidebar">
            <div class="sidebar-group">
                <h3>Browse</h3>
                <a href="#" class="sidebar-link active" onclick="filterSelection('all')">
                    <span class="icon">🏠</span> All Mods
                </a>
                <a href="#" class="sidebar-link" onclick="filterSelection('popular')">
                    <span class="icon">🔥</span> Popular
                </a>
            </div>

            <div class="sidebar-group">
                <h3>Categories</h3>
                <a href="#" class="sidebar-link" onclick="filterSelection('cars')">
                    <span class="icon">🏎️</span> Cars
                </a>
                <a href="#" class="sidebar-link" onclick="filterSelection('trucks')">
                    <span class="icon">🚛</span> Trucks
                </a>
                <a href="#" class="sidebar-link" onclick="filterSelection('maps')">
                    <span class="icon">🗺️</span> Maps
                </a>
            </div>
        </aside>

        <section class="mods" id="mods">
            
            <div class="mod-card" data-category="cars">
                <div class="img-container">
                    <img src="https://images.unsplash.com/photo-1555215695-3004980ad54e?w=500">
                    <div class="tag">NEW</div>
                </div>
                <div class="card-info">
                    <h2>BMW M4 (G82)</h2>
                    <p>High quality textures & custom sounds.</p>
                    <a href="mods/bmw-m4.html" class="download">Download</a>
                </div>
            </div>

            <div class="mod-card" data-category="cars">
                <div class="img-container">
                    <img src="https://images.unsplash.com/photo-1563720223185-11003d516935?w=500">
                </div>
                <div class="card-info">
                    <h2>Nissan GTR R35</h2>
                    <p>Realistic physics & PBR lighting.</p>
                    <a href="mods/gtr.html" class="download">Download</a>
                </div>
            </div>

            <div class="mod-card" data-category="maps">
                <div class="img-container">
                    <img src="https://images.unsplash.com/photo-1464822759023-fed622ff2c3b?w=500">
                </div>
                <div class="card-info">
                    <h2>Mount Akina</h2>
                    <p>The legendary drift pass for BeamNG.</p>
                    <a href="#" class="download">Download</a>
                </div>
            </div>

        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
