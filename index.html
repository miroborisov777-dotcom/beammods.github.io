<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BeamMods | Premium BeamNG Mods</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>

    <header class="header">
        <div class="logo" onclick="window.location.href='index.html'" style="cursor:pointer">BEAM<span>MODS</span></div>
        <div class="search-container">
            <input type="text" id="search" placeholder="Search for mods..." onkeyup="searchMods()">
        </div>
    </header>

    <main class="main-layout">
        <aside class="sidebar">
            <div class="sidebar-group">
                <h3>Browse</h3>
                <a href="#" class="sidebar-link active" onclick="filterSelection('all')">
                    <span class="icon">🏠</span> All Mods
                </a>
            </div>

            <div class="sidebar-group">
                <h3>Categories</h3>
                <a href="#" class="sidebar-link" onclick="filterSelection('cars')">
                    <span class="icon">🏎️</span> Cars
                </a>
                <a href="#" class="sidebar-link" onclick="filterSelection('trucks')">
                    <span class="icon">🚛</span> Trucks
                </a>
                <a href="#" class="sidebar-link" onclick="filterSelection('maps')">
                    <span class="icon">🗺️</span> Maps
                </a>
            </div>
        </aside>

        <section class="mods" id="mods">
            <div style="color: #555; padding: 20px;">Loading mods...</div>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
