<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BeamMods | Premium BeamNG Mods</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        /* FORCED RESET - This overrides everything */
        body { background-color: #0b0e14 !important; color: white !important; margin: 0; font-family: 'Inter', sans-serif; }
        .header { background: #0b0e14 !important; border-bottom: 1px solid #1c2128 !important; padding: 18px 40px; display: flex; justify-content: space-between; align-items: center; }
        .logo { font-weight: 800; letter-spacing: 4px; font-size: 22px; text-transform: uppercase; color: white !important; }
        .logo span { color: #3498db !important; }
        .main-layout { display: flex; max-width: 1400px; margin: 0 auto; padding: 30px; gap: 40px; }
        .sidebar { width: 240px; }
        .sidebar-link { display: block; color: #8b949e !important; text-decoration: none !important; padding: 12px; border-radius: 10px; margin-bottom: 5px; font-weight: 600; }
        .sidebar-link.active { background: #1c2128 !important; color: white !important; }
        
        /* THE BUTTON FIX */
        .view-btn { 
            display: block !important; 
            background: #3498db !important; 
            color: white !important; 
            text-align: center !important; 
            padding: 12px !important; 
            border-radius: 10px !important; 
            text-decoration: none !important; 
            font-weight: 700 !important; 
            margin-top: 15px !important;
        }

        .mods { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 30px; width: 100%; }
        .mod-card { background: #161b22 !important; border-radius: 14px; overflow: hidden; border: 1px solid #1c2128 !important; }
    </style>
</head>
<body>
    <header class="header">
        <div class="logo">BEAM<span>MODS</span></div>
        <div style="background:#161b22; padding:10px; border-radius:8px; border:1px solid #30363d;">
            <input type="text" id="search" placeholder="Search mods..." oninput="searchMods()" style="background:transparent; border:none; color:white; outline:none; width:200px;">
        </div>
    </header>
    <main class="main-layout">
        <aside class="sidebar">
            <a href="#" class="sidebar-link active" onclick="filterSelection('all', this)">🏠 All Mods</a>
            <a href="#" class="sidebar-link" onclick="filterSelection('cars', this)">🏎️ Cars</a>
            <a href="#" class="sidebar-link" onclick="filterSelection('trucks', this)">🚛 Trucks</a>
            <a href="#" class="sidebar-link" onclick="filterSelection('parts', this)">🔧 Vehicle Parts</a>
        </aside>
        <section class="mods" id="mods">
            <p style="padding:20px;">Loading your mods...</p>
        </section>
    </main>
    <script src="script.js?v=999"></script>
</body>
</html>
