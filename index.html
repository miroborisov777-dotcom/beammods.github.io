<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BeamMods | Premium BeamNG Mods</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
 <style>
    body { background-color: #0b0e14; color: white; margin: 0; font-family: 'Inter', sans-serif; -webkit-font-smoothing: antialiased; }

    /* ULTIMATE POP LOGO */
    .header { 
        background: #0b0e14; 
        border-bottom: 1px solid #1c2128; 
        padding: 15px 40px; 
        display: flex; 
        justify-content: space-between; 
        align-items: center; 
        position: sticky; top: 0; z-index: 1000;
    }
    .logo { 
        font-weight: 900; 
        letter-spacing: 6px; /* Increased spacing for that premium look */
        font-size: 20px; 
        text-transform: uppercase; 
        color: #ffffff; 
        cursor: pointer;
        display: flex;
        align-items: center;
    }
    .logo span { 
        color: #3498db; 
        margin-left: 2px;
        text-shadow: 0 0 12px rgba(52, 152, 219, 0.6); /* Blue Neon Glow */
    }

    /* SLIM STEALTH SEARCH BAR */
    .search-container { 
        background: #11141a; 
        border: 1px solid #21262d; 
        border-radius: 6px; 
        padding: 4px 12px; 
        display: flex; 
        align-items: center;
    }
    .search-container input { 
        background: transparent; 
        border: none; 
        color: white; 
        padding: 6px 0; 
        width: 220px; 
        outline: none; 
        font-size: 13px; 
        font-weight: 400;
    }
    .search-container input::placeholder { color: #484f58; opacity: 0.8; }

    /* SIDEBAR REFINEMENT */
    .main-layout { display: flex; max-width: 1400px; margin: 0 auto; padding: 25px; gap: 40px; }
    .sidebar { width: 220px; flex-shrink: 0; }
    .sidebar-title { color: #444; font-size: 10px; font-weight: 800; letter-spacing: 1.5px; margin: 25px 0 10px 12px; text-transform: uppercase; }
    .sidebar-link { 
        display: flex; align-items: center; color: #8b949e; text-decoration: none; 
        padding: 10px 14px; border-radius: 8px; margin-bottom: 2px; transition: 0.2s; font-weight: 600; font-size: 13.5px; 
    }
    .sidebar-link:hover { color: white; background: #1c2128; }
    .sidebar-link.active { background: #1c2128; color: white; border-left: 2px solid #3498db; border-radius: 0 8px 8px 0; }
    .sidebar-link span { margin-right: 12px; font-size: 16px; width: 20px; text-align: center; }

    /* GRID */
    .mods { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 25px; width: 100%; }
    .mod-card { background: #161b22; border-radius: 12px; overflow: hidden; border: 1px solid #1c2128; transition: 0.3s; cursor: pointer; }
    .mod-card:hover { border-color: #3498db; transform: translateY(-4px); box-shadow: 0 10px 20px rgba(0,0,0,0.4); }
</style>
</head>
<header class="header">
    <div style="display: flex; align-items: center; gap: 20px;">
        <button id="menu-toggle" onclick="toggleSidebar()" style="background: #161b22; border: 1px solid #30363d; color: white; padding: 8px 12px; border-radius: 6px; cursor: pointer; font-size: 18px;">
            ☰
        </button>
        <div class="logo" onclick="window.location.href='index.html'">BEAM<span>MODS</span></div>
    </div>
    <div class="search-container">
        <input type="text" id="search" placeholder="Search mods..." oninput="searchMods()">
    </div>
<aside class="sidebar" id="sidebar-menu">
    <div class="sidebar-title">Main</div>
    <a href="javascript:void(0)" class="sidebar-link active" onclick="filterSelection('all', this)"><span>🏠</span> All Mods</a>
    </aside>
    <div class="logo" onclick="window.location.href='index.html'">BEAM<span>MODS</span></div>
    <div class="search-container">
        <input type="text" id="search" placeholder="Search mods..." oninput="searchMods()">
    </div>
</header>
    <main class="main-layout">
        <aside class="sidebar">
            <div class="sidebar-title">Main</div>
            <a href="javascript:void(0)" class="sidebar-link active" onclick="filterSelection('all', this)"><span>🏠</span> All Mods</a>
            
            <div class="sidebar-title">Vehicles</div>
            <a href="javascript:void(0)" class="sidebar-link" onclick="filterSelection('cars', this)"><span>🏎️</span> Cars</a>
            <a href="javascript:void(0)" class="sidebar-link" onclick="filterSelection('trucks', this)"><span>🚛</span> Trucks</a>
            
            <div class="sidebar-title">Customization</div>
            <a href="javascript:void(0)" class="sidebar-link" onclick="filterSelection('parts', this)"><span>🔧</span> Vehicle Parts</a>
            <a href="javascript:void(0)" class="sidebar-link" onclick="filterSelection('skins', this)"><span>🎨</span> Skins & Liveries</a>
            <a href="javascript:void(0)" class="sidebar-link" onclick="filterSelection('sounds', this)"><span>🔊</span> Engine Sounds</a>
            
            <div class="sidebar-title">World</div>
            <a href="javascript:void(0)" class="sidebar-link" onclick="filterSelection('maps', this)"><span>🗺️</span> Maps</a>
        </aside>
        <section class="mods" id="mods"></section>
    </main>
    <script src="script.js?v=final_fix"></script>
</body>
</html>
